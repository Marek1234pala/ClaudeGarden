<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .home-wrapper { text-align: center; padding: 10% 1rem; }
    .greeting { font-size: 3rem; font-weight: bold; margin-bottom: 1.5rem; color: #07001f; }
    .skeleton {
      display: inline-block; width: 260px; height: 3rem;
      background: linear-gradient(90deg, #e2e2e2 25%, #c9d6ff 50%, #e2e2e2 75%);
      background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .logout-btn {
      display: inline-block; margin-top: 1rem; padding: 0.6rem 2rem;
      background: rgb(125,125,235); color: white; border: none; border-radius: 5px;
      font-size: 1rem; cursor: pointer; transition: background 0.3s;
    }
    .logout-btn:hover { background: #07001f; }
  </style>
</head>
<body>
  <div class="home-wrapper">
    <p class="greeting">Hello <span id="userName"><span class="skeleton"></span></span> :)</p>
    <br>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>

  <script>
    const API = '/api/auth';

    (async () => {
      try {
        const res  = await fetch(`${API}/me`);
        const data = await res.json();
        if (!data.success) { window.location.href = '/'; return; }
        document.getElementById('userName').textContent =
          `${data.user.firstName} ${data.user.lastName}`;
      } catch {
        window.location.href = '/';
      }
    })();

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try { await fetch(`${API}/logout`, { method: 'POST' }); } finally {
        window.location.href = '/';
      }
    });
  </script>
</body>
</html>
