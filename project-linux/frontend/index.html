<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register & Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .error-msg {
      color: #c0392b;
      font-size: 0.85rem;
      margin: 0.4rem 0 0.2rem 0;
      text-align: center;
      min-height: 1.1rem;
    }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- ── Sign Up Form ── -->
  <div class="container" id="signup" style="display:none;">
    <h1 class="form-title">Register</h1>
    <form id="registerForm">
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" name="fName" id="fName" placeholder="First Name" required>
        <label for="fName">First Name</label>
      </div>
      <div class="input-group">
        <i class="fas fa-user"></i>
        <input type="text" name="lName" id="lName" placeholder="Last Name" required>
        <label for="lName">Last Name</label>
      </div>
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" id="regEmail" placeholder="Email" required>
        <label for="regEmail">Email</label>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" id="regPassword" placeholder="Password" required>
        <label for="regPassword">Password</label>
      </div>
      <p class="error-msg" id="registerError"></p>
      <input type="submit" class="btn" value="Sign Up" id="registerBtn">
    </form>
    <p class="or">----------or--------</p>
    <div class="icons">
      <i class="fab fa-google"></i>
      <i class="fab fa-facebook"></i>
    </div>
    <div class="links">
      <p>Already Have Account?</p>
      <button id="signInButton">Sign In</button>
    </div>
  </div>

  <!-- ── Sign In Form ── -->
  <div class="container" id="signIn">
    <h1 class="form-title">Sign In</h1>
    <form id="loginForm">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" id="loginEmail" placeholder="Email" required>
        <label for="loginEmail">Email</label>
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" id="loginPassword" placeholder="Password" required>
        <label for="loginPassword">Password</label>
      </div>
      <p class="recover"><a href="#">Recover Password</a></p>
      <p class="error-msg" id="loginError"></p>
      <input type="submit" class="btn" value="Sign In" id="loginBtn">
    </form>
    <p class="or">----------or--------</p>
    <div class="icons">
      <i class="fab fa-google"></i>
      <i class="fab fa-facebook"></i>
    </div>
    <div class="links">
      <p>Don't have an account yet?</p>
      <button id="signUpButton">Sign Up</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
